name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:pages
      - run: |
          if [ -d ".output/public" ]; then
            cp -R .output/public pages-artifact
          elif [ -d "dist" ]; then
            cp -R dist pages-artifact
          else
            echo "No static output found"
            find . -maxdepth 3 -type d
            exit 1
          fi
          test -f pages-artifact/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
